# Fresh MySQL matrix for the pcs integration suite (test/integration.sh).
# Ports are distinct from anything the suite's assertions might clash
# with locally. Run via: make integration
#
# The suite issues a few hundred ALTERs per version; relaxed durability
# keeps that fast on Docker's slow fsync. Never copy these flags to
# production.
x-tuning: &tuning
  - --innodb-flush-log-at-trx-commit=2
  - --sync-binlog=0
  - --skip-name-resolve

services:
  mysql57:
    image: mysql:5.7
    container_name: pcs-int-57
    command: *tuning
    environment:
      MYSQL_ROOT_PASSWORD: pcs-int
    ports:
      - "127.0.0.1:34057:3306"
  mysql80:
    image: mysql:8.0
    container_name: pcs-int-80
    command: *tuning
    environment:
      MYSQL_ROOT_PASSWORD: pcs-int
    ports:
      - "127.0.0.1:34080:3306"
  mysql84:
    image: mysql:8.4
    container_name: pcs-int-84
    command: *tuning
    environment:
      MYSQL_ROOT_PASSWORD: pcs-int
    ports:
      - "127.0.0.1:34084:3306"
  mysql9:
    image: mysql:9
    container_name: pcs-int-9
    command: *tuning
    environment:
      MYSQL_ROOT_PASSWORD: pcs-int
    ports:
      - "127.0.0.1:34090:3306"
